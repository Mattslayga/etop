name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-arm64:
    name: macOS Apple Silicon release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/etop dist/etop
          chmod +x dist/etop
          tar -C dist -czf "etop-${{ github.ref_name }}-macos-aarch64.tar.gz" etop

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          files: etop-${{ github.ref_name }}-macos-aarch64.tar.gz
          generate_release_notes: true
